spring.application.name=sacpa
server.port=8080


# ============================================================
# DATASOURCE — usuario de aplicacion (permisos restringidos por rol BD)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5433/bd_sistema_agro
spring.datasource.username=app_sacpa
spring.datasource.password=AppSacpa2024.
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=seguridad
spring.jpa.open-in-view=false

# ============================================================
# LOGGING
# ============================================================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.uteq.sacpa.aspect=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc.datasource.init=DEBUG

# ============================================================
# MULTIPART — documentos adjuntos a lotes
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.devtools.restart.enabled=false

# ============================================================
# CLOUDINARY — documentos del lote
# ============================================================
cloudinary.cloud_name=your_cloud_name
cloudinary.api_key=your_api_key
cloudinary.api_secret=your_api_secret

# ============================================================
# MAIL — notificaciones de alertas
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dz8928289@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

